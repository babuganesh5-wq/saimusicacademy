<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Telemetry Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090d16;
      --card-bg: rgba(16, 24, 48, 0.65);
      --border: rgba(255, 255, 255, 0.08);
      --primary: #00f2fe;
      --secondary: #4facfe;
      --accent: #bd00ff;
      --text: #f0f4fc;
      --text-muted: #8fa0c4;
      --success: #00e676;
      --error: #ff1744;
      --font: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 380px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      padding: 16px;
      overflow-x: hidden;
      border-radius: 12px;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .title-area h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .title-area p {
      font-size: 10px;
      color: var(--text-muted);
    }

    .status-badge {
      font-size: 9px;
      font-weight: 600;
      color: var(--success);
      background: rgba(0, 230, 118, 0.1);
      padding: 4px 8px;
      border-radius: 12px;
      border: 1px solid rgba(0, 230, 118, 0.2);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-pulse {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.5; }
      100% { transform: scale(0.9); opacity: 1; }
    }

    /* Main Grid */
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .metric-card:hover {
      border-color: rgba(0, 242, 254, 0.3);
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.05);
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(to bottom, var(--primary), var(--secondary));
      opacity: 0.8;
    }

    .metric-card.cost::before {
      background: linear-gradient(to bottom, var(--accent), #ff007f);
    }

    .metric-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .metric-subtext {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Wide card */
    .wide-card {
      grid-column: 1 / -1;
    }

    .wide-card::before {
      background: linear-gradient(to right, var(--primary), var(--accent));
    }

    .token-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }

    .token-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 3px;
      width: 0%;
      transition: width 0.8s ease-in-out;
    }

    .token-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Section Headers */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-title span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Logs Area */
    .logs-list {
      max-height: 180px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
      padding-right: 2px;
    }

    .log-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      transition: all 0.2s ease;
    }

    .log-item:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .log-model {
      font-weight: 600;
      color: var(--primary);
    }

    .log-time {
      font-size: 9px;
      color: var(--text-muted);
    }

    .log-stats {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.2);
      padding: 4px 6px;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .log-stats span strong {
      color: var(--text);
    }

    .log-snippet {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-style: italic;
      border-left: 2px solid rgba(255, 255, 255, 0.1);
      padding-left: 6px;
    }

    .no-logs {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      padding: 24px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    /* Actions Area */
    .actions-row {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 10px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #05070e;
      border: none;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.15);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 242, 254, 0.25);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>
  <!-- Header Title -->
  <header>
    <div class="title-area">
      <h1>Gemini Telemetry</h1>
      <p>Usage & Observability Toolkit</p>
    </div>
    <div class="status-badge">
      <div class="status-pulse"></div>
      Active
    </div>
  </header>

  <!-- Metrics Grid -->
  <div class="metrics-grid">
    <!-- Cost Card -->
    <div class="metric-card cost">
      <div class="metric-label">Estimated Cost</div>
      <div class="metric-value" id="val-cost">$0.00000</div>
      <div class="metric-subtext" id="val-requests">0 requests</div>
    </div>

    <!-- Latency Card -->
    <div class="metric-card">
      <div class="metric-label">Avg Latency</div>
      <div class="metric-value" id="val-latency">0 ms</div>
      <div class="metric-subtext" id="val-success">100% success</div>
    </div>

    <!-- Token distribution wide card -->
    <div class="metric-card wide-card">
      <div class="metric-label">Token Consumption</div>
      <div class="metric-value" id="val-tokens">0 tkn</div>
      <div class="token-bar-container">
        <div class="token-bar" id="token-bar"></div>
      </div>
      <div class="token-bar-labels">
        <span id="val-input">In: 0</span>
        <span id="val-output">Out: 0</span>
      </div>
    </div>
  </div>

  <!-- Recent activity logs -->
  <div class="section-title">
    <span>Recent Traced Activity</span>
  </div>

  <div class="logs-list" id="logs-list">
    <div class="no-logs">No Gemini requests traced yet. Make a request in AI Studio or open the local web UI!</div>
  </div>

  <!-- Foot operations -->
  <div class="actions-row">
    <button class="btn-primary" id="btn-devtools">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>
      Inspect Live
    </button>
    <button class="btn-secondary" id="btn-reset">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9"/></svg>
      Reset Stats
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
